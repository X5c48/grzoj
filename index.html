    gl.vertexAttribPointer(uvLoc, 2, gl.FLOAT, false, 16, 8);

    var U = {};
    ['iTime','iResolution','uScale','uGridMul','uDigitSize','uScanlineIntensity','uGlitchAmount','uFlickerAmount','uNoiseAmp','uChromaticAberration','uDither','uCurvature','uTint','uMouse','uMouseStrength','uUseMouse','uPageLoadProgress','uUsePageLoadAnimation','uBrightness'].forEach(function(n) {
      U[n] = gl.getUniformLocation(program, n);
    });
    this.U = U;
    function h2r(h) { h = h.replace('#','').trim(); if (h.length === 3) h = h.split('').map(function(c){return c+c}).join(''); var n = parseInt(h,16); return [((n>>16)&255)/255,((n>>8)&255)/255,(n&255)/255]; }
    var tint = h2r(o.tint);
    gl.uniform3f(U.uTint, tint[0], tint[1], tint[2]);
    gl.uniform1f(U.uScale, o.scale);
    gl.uniform2f(U.uGridMul, o.gridMul[0], o.gridMul[1]);
    gl.uniform1f(U.uDigitSize, o.digitSize);
    gl.uniform1f(U.uScanlineIntensity, o.scanlineIntensity);
    gl.uniform1f(U.uGlitchAmount, o.glitchAmount);
    gl.uniform1f(U.uFlickerAmount, o.flickerAmount);
    gl.uniform1f(U.uNoiseAmp, o.noiseAmp);
    gl.uniform1f(U.uChromaticAberration, o.chromaticAberration);
    gl.uniform1f(U.uDither, typeof o.dither === 'boolean' ? (o.dither ? 1 : 0) : o.dither);
    gl.uniform1f(U.uCurvature, o.curvature);
    gl.uniform2f(U.uMouse, 0.5, 0.5);
    gl.uniform1f(U.uMouseStrength, o.mouseStrength);
    gl.uniform1f(U.uUseMouse, o.mouseReact ? 1 : 0);
    gl.uniform1f(U.uPageLoadProgress, o.pageLoadAnimation ? 0 : 1);
    gl.uniform1f(U.uUsePageLoadAnimation, o.pageLoadAnimation ? 1 : 0);
    gl.uniform1f(U.uBrightness, o.brightness);

    this.mouse = { x: 0.5, y: 0.5 };
    this.smoothMouse = { x: 0.5, y: 0.5 };
    this.frozenTime = 0;
    this.timeOffset = Math.random() * 100;
    this.loadStart = 0;
    this.raf = 0;
    this._destroyed = false;
    var self = this;
    this._resize = function() {
      var w = el.offsetWidth, h = el.offsetHeight;
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = w * dpr; canvas.height = h * dpr;
      gl.viewport(0, 0, canvas.width, canvas.height);
      gl.uniform3f(U.iResolution, canvas.width, canvas.height, canvas.width / canvas.height);
    };
    this._mouseMove = function(e) {
      var r = el.getBoundingClientRect();
      self.mouse = { x: (e.clientX - r.left) / r.width, y: 1 - (e.clientY - r.top) / r.height };
    };
    this.ro = new ResizeObserver(function() { self._resize(); });
    this.ro.observe(el);
    this._resize();
    if (o.mouseReact) el.addEventListener('mousemove', this._mouseMove);
    function animate(t) {
      if (self._destroyed) return;
      self.raf = requestAnimationFrame(animate);
      if (o.pageLoadAnimation && self.loadStart === 0) self.loadStart = t;
      if (!o.pause) {
        var et = (t * 0.001 + self.timeOffset) * o.timeScale;
        gl.uniform1f(U.iTime, et);
        self.frozenTime = et;
      } else { gl.uniform1f(U.iTime, self.frozenTime); }
      if (o.pageLoadAnimation && self.loadStart > 0) {
        gl.uniform1f(U.uPageLoadProgress, Math.min((t - self.loadStart) / 2000, 1));
      }
      if (o.mouseReact) {
        var sm = self.smoothMouse, m = self.mouse, df = 0.08;
        sm.x += (m.x - sm.x) * df; sm.y += (m.y - sm.y) * df;
        gl.uniform2f(U.uMouse, sm.x, sm.y);
      }
      gl.clear(gl.COLOR_BUFFER_BIT);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    }
    this.raf = requestAnimationFrame(animate);
  }
  FaultyTerminal.prototype.destroy = function() {
    this._destroyed = true;
    cancelAnimationFrame(this.raf);
    if (this.ro) this.ro.disconnect();
    if (this.opts.mouseReact) this.el.removeEventListener('mousemove', this._mouseMove);
    if (this.canvas && this.canvas.parentElement === this.el) this.el.removeChild(this.canvas);
    if (this.gl) {
      var ext = this.gl.getExtension('WEBGL_lose_context');
      if (ext) ext.loseContext();
    }
    cleanLayers(this.el.parentElement);
  };

  function cleanLayers(hero) {
    if (!hero) return;
    var layers = hero.querySelectorAll('.hero-glow,.hero-scan,.hero-grain,.ft-canvas');
    for (var i = 0; i < layers.length; i++) {
      if (layers[i].parentElement === hero) hero.removeChild(layers[i]);
    }
    stopParticles();
  }

  var ftInstance = null;
  var particlesRunning = false;
  var particlesCanvas = null;
  var particlesCtx = null;
  var particles = [];
  var particlesHero = null;
  var particlesRaf = null;

  function startParticles(hero) {
    if (particlesRunning) return;
    particlesRunning = true;
    particlesHero = hero;
    particlesCanvas = document.createElement('canvas');
    particlesCanvas.style.cssText = 'position:absolute;inset:0;z-index:1;pointer-events:none;width:100%;height:100%;';
    particlesCanvas.width = 0;
    particlesCanvas.height = 0;
    hero.appendChild(particlesCanvas);
    particlesCtx = particlesCanvas.getContext('2d');
    resizeParticles();
    window.addEventListener('resize', resizeParticles);
    particles = [];
    for (var i = 0; i < 30; i++) {
      particles.push({ x: Math.random() * particlesCanvas.width, y: Math.random() * particlesCanvas.height, size: Math.random() * 2 + 0.5, speed: Math.random() * 0.3 + 0.1, opacity: Math.random() * 0.5 + 0.1, delay: Math.random() * 5000 });
    }
    animateParticles();
  }

  function resizeParticles() {
    if (!particlesCanvas || !particlesHero) return;
    var w = particlesHero.offsetWidth;
    var h = particlesHero.offsetHeight;
    var dpr = window.devicePixelRatio || 1;
    particlesCanvas.width = w * dpr;
    particlesCanvas.height = h * dpr;
    particlesCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function animateParticles() {
    if (!particlesRunning) return;
    var w = particlesHero.offsetWidth;
    var h = particlesHero.offsetHeight;
    particlesCtx.clearRect(0, 0, w, h);
    var now = performance.now();
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      var t = ((now + p.delay) % 8000) / 8000;
      var py = h * (1 - t);
      var alpha = t < 0.1 ? t / 0.1 : t > 0.9 ? (1 - t) / 0.1 : 1;
      alpha *= p.opacity;
      particlesCtx.beginPath();
      particlesCtx.arc(p.x, py, p.size, 0, Math.PI * 2);
      particlesCtx.fillStyle = 'rgba(249,115,22,' + alpha + ')';
      particlesCtx.fill();
    }
    particlesRaf = requestAnimationFrame(animateParticles);
  }

  function stopParticles() {
    particlesRunning = false;
    if (particlesRaf) { cancelAnimationFrame(particlesRaf); particlesRaf = null; }
    if (particlesCanvas && particlesCanvas.parentElement) particlesCanvas.parentElement.removeChild(particlesCanvas);
    particlesCanvas = null;
    particlesCtx = null;
    particles = [];
    window.removeEventListener('resize', resizeParticles);
  }
  function mount() {
    var hero = document.querySelector('section.h-screen');
    if (!hero) return null;
    if (hero.querySelector('.ft-canvas')) return null;
    var heroStyle = window.getComputedStyle(hero);
    if (heroStyle.position === 'static') hero.style.position = 'relative';

    var glow = document.createElement('div');
    glow.className = 'hero-glow ft-canvas';
    hero.appendChild(glow);

    var scan = document.createElement('div');
    scan.className = 'hero-scan ft-canvas';
    hero.appendChild(scan);

    startParticles(hero);

    var wrapper = document.createElement('div');
    wrapper.className = 'faulty-terminal-overlay ft-canvas';
    wrapper.style.cssText = 'position:absolute;inset:0;z-index:5;pointer-events:none;opacity:.35;mix-blend-mode:screen;';
    hero.appendChild(wrapper);

    var grain = document.createElement('div');
    grain.className = 'hero-grain ft-canvas';
    hero.appendChild(grain);

    return new FaultyTerminal(wrapper, {
      scale: 1, gridMul: [2, 1], digitSize: 1.5, timeScale: 0.3,
      scanlineIntensity: 0.3, glitchAmount: 1, flickerAmount: 1, noiseAmp: 0,
      curvature: 0.2, tint: '#F97316', mouseReact: true, mouseStrength: 0.2,
      pageLoadAnimation: true, brightness: 1
    });
  }
  function init() {
    if (ftInstance) { ftInstance.destroy(); ftInstance = null; }
    stopParticles();
    ftInstance = mount();
  }
  setTimeout(init, 100);
  })();
</script>
  </body>
</html>
